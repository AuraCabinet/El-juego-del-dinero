<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>El Juego del Dinero</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-level="1">
  <canvas id="particles"></canvas>
  <main class="shell">
    <section id="onboarding" class="onboarding">
      <div class="brand"><span>$</span><div><p>Mundo financiero latinoamericano</p><h1>El Juego del Dinero</h1></div></div>
      <p class="intro">Explora cinco continentes, supera paises financieros, responde ante imprevistos y gana certificados por mundo.</p>
      <form id="name-form" class="panel">
        <label>Selecciona tu rango</label>
        <div class="age-grid">
          <button type="button" class="age active" data-onboard-level="1"><b>Nino</b><small>6-9 anos</small></button>
          <button type="button" class="age" data-onboard-level="2"><b>Adolescente</b><small>10-15 anos</small></button>
          <button type="button" class="age" data-onboard-level="3"><b>Mujer adulta</b><small>Finanzas y emprendimiento</small></button>
          <button type="button" class="age" data-onboard-level="4"><b>Estudiante emprendedor</b><small>Negocio y escala</small></button>
        </div>
        <div id="companions" class="companions"></div>
        <label for="player-name">Nombre del estudiante</label>
        <div class="input-row"><input id="player-name" required maxlength="40" placeholder="Escribe tu nombre"><button>Entrar</button></div>
      </form>
    </section>

    <section id="game" class="hidden">
      <header class="topbar">
        <div class="brand small"><span>$</span><div><p>El Juego del Dinero</p><h2 id="welcome">Hola</h2></div></div>
        <div class="stats"><div><b id="tokens">0</b><small>tokens</small></div><div><b id="done">0/50</b><small>paises</small></div><div><b id="score">0%</b><small>ultimo</small></div></div>
        <div class="data-actions"><button id="export-json" type="button">Datos JSON</button><button id="export-csv" type="button">Datos CSV</button></div>
      </header>
      <div id="firebase-status" class="firebase-status local">Guardado local activo</div>
      <nav class="levels"><button data-level="1">Nino</button><button data-level="2">Adolescente</button><button data-level="3">Mujer adulta</button><button data-level="4">Emprendedor</button></nav>
      <section class="world-layout">
        <aside id="world-buttons" class="world-buttons"></aside>
        <section class="map-panel">
          <div class="map-head"><div><p id="world-region">Cono Sur</p><h2 id="world-title">El Hogar</h2></div><p id="world-description"></p></div>
          <div id="map" class="map"></div>
        </section>
      </section>
    </section>
  </main>

  <dialog id="mission"><button class="close" id="close-mission">x</button><div id="mission-content"></div></dialog>
  <dialog id="certificate"><button class="close" id="close-certificate">x</button><div id="certificate-content"></div></dialog>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
